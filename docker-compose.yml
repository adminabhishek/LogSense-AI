version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ai-infra-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ai-infra-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai-infra-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ai-infra-data:
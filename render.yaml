services:
  - type: web
    name: logsense-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContextPath: ./backend
    envVars:
      - key: OPENAI_API_KEY
        sync: false
    healthCheckPath: /health

  - type: web
    name: logsense-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContextPath: ./frontend
    envVars:
      - key: VITE_API_URL
        value: https://logsense-backend.onrender.com
    healthCheckPath: /